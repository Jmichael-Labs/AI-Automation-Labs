  <g transform="translate(1120 180)"><rect class="b" width="360" height="300" rx="24" filter="url(#g)"/><text class="t h" x="180" y="58">CURRENT</text><text class="t s" x="180" y="115">Live pressure</text><text class="t s" x="180" y="155">Limit rejection</text><text class="t s" x="180" y="205">Authority update</text><text class="t s" x="180" y="245">New vote</text></g>
